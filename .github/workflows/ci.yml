name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test --verbose

  build:
    name: Build (${{ matrix.target }})
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: connect4
            asset_name: connect4-linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: connect4.exe
            asset_name: connect4-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: connect4-linux-x64
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: connect4-windows-x64.exe
          path: artifacts/windows
      - run: |
          mv artifacts/linux/connect4 artifacts/connect4-linux-x64
          mv artifacts/windows/connect4.exe artifacts/connect4-windows-x64.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/connect4-linux-x64
            artifacts/connect4-windows-x64.exe
          generate_release_notes: true
